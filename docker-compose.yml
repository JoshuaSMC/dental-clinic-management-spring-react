version: '3.8'

services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: atelier-backend
    ports:
      - "8081:8081"
    environment:
      JWT_SECRET: ${JWT_SECRET:-dental-jwt-secret-change-in-production}
      ADMIN_SECRET: ${ADMIN_SECRET:-dental-admin-2026}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: atelier-frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
